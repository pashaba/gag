  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f7f8fa;--card:#fff;--border:#e8eaed;
      --orange:#f6821f;--orange-light:rgba(246,130,31,0.08);
      --green:#22c55e;--text:#1a1a2e;--text2:#6b7280;--wa:#25D366;

    }
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

    /* NAV */
    nav{
      background:#fff;border-bottom:1px solid var(--border);
      padding:0.85rem 1.5rem;display:flex;align-items:center;
      justify-content:space-between;position:sticky;top:0;z-index:100;
      box-shadow:0 1px 8px rgba(0,0,0,0.05);
    }
    .nav-logo{font-weight:900;font-size:1rem;color:var(--orange);text-decoration:none;display:flex;align-items:center;gap:0.4rem}
    .nav-logo span{color:var(--text);font-weight:700}
    .nav-right{display:flex;align-items:center;gap:0.7rem;flex-wrap:wrap}
    .live-badge{display:flex;align-items:center;gap:0.35rem;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--green);font-size:0.72rem;font-weight:700;padding:0.28rem 0.65rem;border-radius:999px}
    .live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(1.5)}}
    .wa-nav{display:flex;align-items:center;gap:0.4rem;background:var(--wa);color:#fff;font-size:0.78rem;font-weight:700;padding:0.35rem 0.9rem;border-radius:999px;text-decoration:none;transition:transform .15s}
    .wa-nav:hover{transform:scale(1.04)}
    .wa-nav svg{width:14px;height:14px;fill:#fff}

    main{max-width:960px;margin:0 auto;padding:1.2rem 1.2rem 3rem}

    /* TIMER BAR */
    .timer-bar{
      background:#fff;border:1px solid var(--border);border-radius:0.9rem;
      padding:0.75rem 1.2rem;margin-bottom:1rem;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:var(--shadow);flex-wrap:wrap;gap:0.5rem;
    }
    .timer-left{display:flex;align-items:center;gap:0.8rem}
    .timer-item{display:flex;flex-direction:column;align-items:center}
    .timer-val{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--orange);line-height:1}
    .timer-lbl{font-size:0.63rem;color:var(--text2);margin-top:0.2rem;text-transform:uppercase;letter-spacing:0.05em}
    .timer-sep{font-size:1.1rem;color:var(--border);font-weight:700;margin-bottom:0.8rem}
    .timer-right{display:flex;flex-direction:column;align-items:flex-end;gap:0.1rem}
    .timer-right .lbl{font-size:0.72rem;color:var(--text2)}
    .timer-right .val{font-family:'Space Mono',monospace;font-size:0.82rem;font-weight:700;color:var(--text)}

    /* Progress bar */
    .progress-wrap{width:100%;height:3px;background:var(--border);border-radius:999px;margin-top:0.6rem;overflow:hidden}
    .progress-bar{height:100%;background:linear-gradient(90deg,var(--orange),#ff9a3c);border-radius:999px;transition:width 1s linear}

    /* WEATHER */
    .weather-card{
      background:linear-gradient(135deg,#fff7ed,#fff);
      border:1px solid #fed7aa;border-radius:0.9rem;
      padding:1rem 1.2rem;margin-bottom:1rem;
      display:flex;align-items:center;gap:1rem;
      box-shadow:var(--shadow);
    }
    .weather-icon{font-size:2.2rem;flex-shrink:0}
    .weather-info{flex:1;min-width:0}
    .weather-info h3{font-weight:800;font-size:0.95rem;color:var(--orange);margin-bottom:0.15rem}
    .weather-info p{font-size:0.8rem;color:var(--text2);line-height:1.5;white-space:pre-line}
    .weather-meta{display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem;flex-shrink:0}
    .weather-meta span{font-family:'Space Mono',monospace;font-size:0.68rem;color:var(--text2);white-space:nowrap}

    /* LAYOUT TOGGLE */
    .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem}
    .toolbar h2{font-size:0.82rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em}
    .view-toggle{display:flex;gap:0.3rem}
    .view-btn{background:#fff;border:1px solid var(--border);border-radius:0.5rem;padding:0.3rem 0.55rem;cursor:pointer;color:var(--text2);font-size:0.8rem;transition:all .15s}
    .view-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}

    /* SECTION */
    .section-wrap{display:flex;flex-direction:column;gap:1rem;margin-bottom:1rem}

    /* GRID VIEW */
    .stock-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media(max-width:600px){.stock-grid{grid-template-columns:1fr}}

    /* LIST VIEW */
    .stock-list{display:flex;flex-direction:column;gap:0.6rem}

    .section-card{background:var(--card);border:1px solid var(--border);border-radius:0.9rem;overflow:hidden;box-shadow:var(--shadow)}
    .section-header{padding:0.85rem 1.1rem 0.7rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .section-header h3{font-size:0.88rem;font-weight:800;display:flex;align-items:center;gap:0.35rem}
    .count-badge{font-size:0.68rem;font-weight:700;background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:0.18rem 0.55rem;border-radius:999px}

    /* SEED CARDS - 2 kolom */
    .seed-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:0.6rem}
    @media(max-width:400px){.seed-cards{grid-template-columns:repeat(2,1fr)}}
    .seed-card{
      background:var(--bg);border:1px solid var(--border);border-radius:0.7rem;
      padding:0.7rem 0.8rem;display:flex;flex-direction:column;gap:0.25rem;
      transition:border-color .15s,transform .15s;cursor:default;
    }
    .seed-card:hover{border-color:#d1d5db;transform:translateY(-1px)}
    .seed-card.epic{
      background:linear-gradient(135deg,rgba(246,130,31,0.06),rgba(255,154,60,0.04));
      border-color:rgba(246,130,31,0.35);
    }
    .seed-card.epic:hover{border-color:var(--orange)}
    .seed-card-top{display:flex;align-items:center;justify-content:space-between}
    .seed-card-emoji{font-size:1.5rem;line-height:1}
    .seed-card-name{font-size:0.8rem;font-weight:700;text-transform:capitalize;color:var(--text);line-height:1.2}
    .seed-card-qty{font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;color:var(--orange)}

    /* ITEM ROW (gear) */
    .item-list{padding:0.4rem 0}
    .item-row{display:flex;align-items:center;gap:0.55rem;padding:0.5rem 1.1rem;transition:background .12s;cursor:default}
    .item-row:hover{background:var(--bg)}
    .item-row.epic{background:linear-gradient(90deg,rgba(246,130,31,0.07) 0%,transparent 100%);border-left:3px solid var(--orange)}
    .item-row.epic:hover{background:linear-gradient(90deg,rgba(246,130,31,0.12) 0%,transparent 100%)}
    .item-emoji{font-size:1.05rem;width:1.4rem;text-align:center;flex-shrink:0}
    .item-name{flex:1;font-size:0.85rem;font-weight:600;text-transform:capitalize}
    .item-badges{display:flex;align-items:center;gap:0.3rem}
    .rare-badge{font-size:0.6rem;background:var(--orange);color:#fff;padding:0.12rem 0.38rem;border-radius:999px;font-weight:800;letter-spacing:0.04em}
    .item-qty{font-family:'Space Mono',monospace;font-size:0.75rem;font-weight:700;color:var(--orange);background:var(--orange-light);padding:0.18rem 0.5rem;border-radius:999px}

    /* LIST VIEW SPECIFIC */
    .list-section-title{display:flex;align-items:center;gap:0.5rem;font-size:0.8rem;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;padding:0.3rem 0}
    .list-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

    /* EMPTY */
    .empty{padding:1.8rem 1rem;text-align:center;color:var(--text2);font-size:0.82rem}
    .empty-icon{font-size:1.6rem;display:block;margin-bottom:0.4rem}

    /* LOADING */
    .loading{display:flex;align-items:center;justify-content:center;padding:3rem;gap:0.5rem;color:var(--text2);font-size:0.88rem}
    .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* FOOTER */
    footer{text-align:center;padding:1.5rem 1rem;color:var(--text2);font-size:0.75rem;border-top:1px solid var(--border);margin-top:1rem}
    footer a{color:var(--orange);text-decoration:none}
  </style>
</head>

<script>
  const SUPABASE_URL  = "https://xcxciixqhmghitmyigbj.supabase.co"
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjeGNpaXhxaG1naGl0bXlpZ2JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NjM0NjAsImV4cCI6MjA5NDEzOTQ2MH0.MAtw-cwRuEWXL0OQzULPs8EXfvMtUx2t3RhZeXu45sk"

  const UPDATE_INTERVAL = 300 // seconds (5 minutes)
  const EPIC_PLUS = new Set(['mushroom','green bean','banana','grape','coconut','mango','dragon fruit','acorn','cherry','sunflower','venus fly trap','pomegranate','poison apple','moon bloom',"dragon's breath",'thorn rose','glow mushroom','horned melon'])
  const WEATHER_EMOJI = {'rain':'🌧️','rainbow':'🌈','snow':'❄️','snowfall':'❄️','fog':'🌫️','storm':'⛈️','wind':'💨','sunshine':'☀️','starfall':'🌟','sandstorm':'🌪️','thunderstorm':'⛈️'}

  let currentView = 'grid'
  let lastUpdatedAt = null
  let nextUpdateAt = null
  let timerInterval = null
  let currentData = null

  function getWeatherEmoji(t) {
    t = (t||'').toLowerCase()
    for (const [k,v] of Object.entries(WEATHER_EMOJI)) if(t.includes(k)) return v
    return '🌤️'
  }

  function timeAgo(iso) {
    if (!iso) return '–'
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000)
    if (diff < 10) return 'just now'
    if (diff < 60) return `${diff}s ago`
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`
    return `${Math.floor(diff/3600)}h ago`
  }

  function pad(n) { return String(n).padStart(2,'0') }

  function startCountdown(updatedAt) {
    lastUpdatedAt = new Date(updatedAt)
    nextUpdateAt = new Date(lastUpdatedAt.getTime() + UPDATE_INTERVAL * 1000)
    document.getElementById('timerBar').style.display = 'flex'
    if (timerInterval) clearInterval(timerInterval)
    timerInterval = setInterval(tickTimer, 1000)
    tickTimer()
  }

  function tickTimer() {
    const now = Date.now()
    const remaining = Math.max(0, Math.floor((nextUpdateAt - now) / 1000))
    const elapsed = Math.max(0, Math.floor((now - lastUpdatedAt) / 1000))
    const progress = Math.max(0, Math.min(100, (remaining / UPDATE_INTERVAL) * 100))

    document.getElementById('nextMin').textContent = pad(Math.floor(remaining / 60))
    document.getElementById('nextSec').textContent = pad(remaining % 60)
    document.getElementById('progressBar').style.width = progress + '%'
    document.getElementById('lastUpdate').textContent = timeAgo(lastUpdatedAt.toISOString())

    if (remaining === 0) {
      clearInterval(timerInterval)
      document.getElementById('nextMin').textContent = '--'
      document.getElementById('nextSec').textContent = '--'
    }
  }

  function setView(v) {
    currentView = v
    document.getElementById('btnGrid').classList.toggle('active', v === 'grid')
    document.getElementById('btnList').classList.toggle('active', v === 'list')
    if (currentData) renderContent(currentData.seeds, currentData.gear)
  }

  function itemHTML(item, type) {
    const isEpic = type === 'seed' && EPIC_PLUS.has(item.name)
    return `<div class="item-row ${isEpic ? 'epic' : ''}">
      <span class="item-emoji">${item.emoji}</span>
      <span class="item-name">${item.name}</span>
      <div class="item-badges">
        ${isEpic ? '<span class="rare-badge">RARE</span>' : ''}
        <span class="item-qty">${item.qty}x</span>
      </div>
    </div>`
  }

  function seedCardHTML(s) {
    const isEpic = EPIC_PLUS.has(s.name)
    return `<div class="seed-card ${isEpic ? 'epic' : ''}">
      <div class="seed-card-top">
        <span class="seed-card-emoji">${s.emoji}</span>
        ${isEpic ? '<span class="rare-badge">RARE</span>' : ''}
      </div>
      <div class="seed-card-name">${s.name}</div>
      <div class="seed-card-qty">${s.qty}x</div>
    </div>`
  }

  function renderContent(seeds, gear) {
    const area = document.getElementById('contentArea')

    const seedsHTML = seeds.length
      ? `<div class="seed-cards">${seeds.map(seedCardHTML).join('')}</div>`
      : '<div class="empty"><span class="empty-icon">🌱</span>No seeds available</div>'

    const gearHTML = gear.length
      ? gear.map(g => itemHTML(g,'gear')).join('')
      : '<div class="empty"><span class="empty-icon">⚙️</span>No gear available</div>'

    if (currentView === 'grid') {
      area.innerHTML = `
        <div class="section-card" style="margin-bottom:1rem">
          <div class="section-header">
            <h3>🌱 Seeds</h3>
            <span class="count-badge">${seeds.length} items</span>
          </div>
          <div style="padding:0.8rem 1rem">${seedsHTML}</div>
        </div>
        <div class="section-card">
          <div class="section-header">
            <h3>⚙️ Gear</h3>
            <span class="count-badge">${gear.length} items</span>
          </div>
          <div class="item-list">${gearHTML}</div>
        </div>`
    } else {
      area.innerHTML = `
        <div class="section-card" style="margin-bottom:1rem">
          <div class="section-header">
            <h3>🌱 Seeds</h3>
            <span class="count-badge">${seeds.length} items</span>
          </div>
          <div style="padding:0.8rem 1rem">${seedsHTML}</div>
        </div>
        <div class="section-card">
          <div class="section-header">
            <h3>⚙️ Gear</h3>
            <span class="count-badge">${gear.length} items</span>
          </div>
          <div class="item-list">${gearHTML}</div>
        </div>`
    }
  }

  function renderWeather(weather) {
    if (!weather?.title) return
    const card = document.getElementById('weatherCard')
    card.style.display = 'flex'
    document.getElementById('weatherIcon').textContent = getWeatherEmoji(weather.title)
    document.getElementById('weatherTitle').textContent = weather.title
    document.getElementById('weatherBody').textContent = (weather.body || '')
      .replace(/<t:\d+:[^>]+>/g, '')
      .replace(/\*\*/g, '')
      .trim()
    document.getElementById('weatherTime').textContent = timeAgo(weather.updatedAt)
  }

  async function fetchStock() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/gag2_stock?id=eq.1&select=*`, {
        headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` }
      })
      const data = await res.json()
      if (!data?.length) return
      const row = data[0]

      document.getElementById('loadingEl').style.display = 'none'
      document.getElementById('toolbar').style.display = 'flex'

      currentData = { seeds: row.seeds || [], gear: row.gear || [] }
      renderContent(currentData.seeds, currentData.gear)
      renderWeather(row.weather || {})
      startCountdown(row.updated_at)
    } catch(e) { console.error('Fetch error:', e) }
  }

  function subscribeRealtime() {
    const ws = new WebSocket(`wss://xcxciixqhmghitmyigbj.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`)
    ws.onopen = () => ws.send(JSON.stringify({ topic:"realtime:public:gag2_stock", event:"phx_join", payload:{}, ref:"1" }))
    ws.onmessage = e => { const m = JSON.parse(e.data); if (m.event==='UPDATE'||m.event==='INSERT') fetchStock() }
    ws.onclose = () => setTimeout(subscribeRealtime, 3000)
  }

  fetchStock()
  subscribeRealtime()
  setInterval(fetchStock, 30000)
</script>
