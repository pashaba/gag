<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grow A Garden 2 – Live Stock Tracker</title>
  <meta name="description" content="Pantau stok seed dan gear Grow A Garden 2 secara real-time." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #ffffff;
      --bg2:      #f7f8fa;
      --border:   #e8eaed;
      --orange:   #f6821f;
      --orange2:  #ff9a3c;
      --green:    #22c55e;
      --text:     #1a1a2e;
      --text2:    #6b7280;
      --card:     #ffffff;
      --wa:       #25D366;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg2);
      color: var(--text);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-weight: 900;
      font-size: 1rem;
      color: var(--orange);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .nav-logo span { color: var(--text); font-weight: 700; }
    .nav-right { display: flex; align-items: center; gap: 0.8rem; }
    .last-update {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--text2);
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--green);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(1.4); }
    }

    /* MAIN */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* WEATHER CARD */
    .weather-card {
      background: linear-gradient(135deg, #fff7ed, #fff);
      border: 1px solid #fed7aa;
      border-radius: 1rem;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .weather-icon { font-size: 2rem; }
    .weather-info h3 {
      font-weight: 800;
      font-size: 1rem;
      color: var(--orange);
      margin-bottom: 0.2rem;
    }
    .weather-info p {
      font-size: 0.82rem;
      color: var(--text2);
      line-height: 1.5;
    }
    .weather-time {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--text2);
      text-align: right;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }

    .section-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      overflow: hidden;
    }
    .section-header {
      padding: 1rem 1.2rem 0.8rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-header h2 {
      font-size: 0.9rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .count-badge {
      font-size: 0.72rem;
      font-weight: 700;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }
    .item-list { padding: 0.6rem 0; }
    .item-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1.2rem;
      transition: background 0.15s;
    }
    .item-row:hover { background: var(--bg2); }
    .item-row.epic {
      background: linear-gradient(90deg, rgba(246,130,31,0.06) 0%, transparent 100%);
      border-left: 3px solid var(--orange);
    }
    .item-row.epic:hover { background: linear-gradient(90deg, rgba(246,130,31,0.1) 0%, transparent 100%); }
    .item-emoji { font-size: 1.1rem; width: 1.5rem; text-align: center; }
    .item-name {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .item-qty {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--orange);
      background: rgba(246,130,31,0.08);
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
    }
    .epic-star {
      font-size: 0.65rem;
      background: var(--orange);
      color: #fff;
      padding: 0.15rem 0.4rem;
      border-radius: 999px;
      font-weight: 800;
    }

    /* EMPTY */
    .empty {
      padding: 2rem 1.2rem;
      text-align: center;
      color: var(--text2);
      font-size: 0.85rem;
    }
    .empty span { font-size: 1.8rem; display: block; margin-bottom: 0.5rem; }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 0.5rem;
      color: var(--text2);
      font-size: 0.88rem;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* WA BUTTON */
    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: var(--wa);
      color: #fff;
      font-weight: 800;
      font-size: 0.9rem;
      padding: 0.8rem 1.5rem;
      border-radius: 999px;
      text-decoration: none;
      margin: 1.2rem auto 0;
      width: fit-content;
      box-shadow: 0 4px 16px rgba(37,211,102,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .wa-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(37,211,102,0.4); }
    .wa-btn svg { width: 18px; height: 18px; fill: #fff; }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text2);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">🌱 <span>GAG2 Stock</span></a>
  <div class="nav-right">
    <span class="last-update" id="lastUpdate">–</span>
    <span class="live-badge"><span class="live-dot"></span> LIVE</span>
  </div>
</nav>

<main>

  <!-- WEATHER -->
  <div class="weather-card" id="weatherCard" style="display:none">
    <div class="weather-icon" id="weatherIcon">🌤️</div>
    <div class="weather-info">
      <h3 id="weatherTitle">–</h3>
      <p id="weatherBody">–</p>
    </div>
    <div class="weather-time" id="weatherTime">–</div>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loadingEl">
    <div class="spinner"></div> Memuat data stok...
  </div>

  <!-- STOCK GRID -->
  <div class="grid" id="stockGrid" style="display:none">

    <!-- SEEDS -->
    <div class="section-card">
      <div class="section-header">
        <h2>🌱 Seeds</h2>
        <span class="count-badge" id="seedCount">0 item</span>
      </div>
      <div class="item-list" id="seedList"></div>
    </div>

    <!-- GEAR -->
    <div class="section-card">
      <div class="section-header">
        <h2>⚙️ Gear</h2>
        <span class="count-badge" id="gearCount">0 item</span>
      </div>
      <div class="item-list" id="gearList"></div>
    </div>

  </div>

  <!-- WA BUTTON -->
  <a href="https://whatsapp.com/channel/0029VbC3ptQ3wtbAAjRJhS3r" target="_blank" rel="noopener" class="wa-btn">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Notifikasi via WhatsApp
  </a>

</main>

<footer>
  © 2025 Grow A Garden 2 Info Stock · <a href="https://growagarden2.polar.web.id">growagarden2.polar.web.id</a>
</footer>

<script>
  const SUPABASE_URL = "https://xcxciixqhmghitmyigbj.supabase.co"
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjeGNpaXhxaG1naGl0bXlpZ2JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NjM0NjAsImV4cCI6MjA5NDEzOTQ2MH0.MAtw-cwRuEWXL0OQzULPs8EXfvMtUx2t3RhZeXu45sk"

  const EPIC_PLUS = new Set([
    'mushroom','green bean','banana','grape','coconut','mango',
    'dragon fruit','acorn','cherry','sunflower',
    'venus fly trap','pomegranate','poison apple',
    'moon bloom',"dragon's breath",'thorn rose','glow mushroom','horned melon'
  ])

  const WEATHER_EMOJI = {
    'rain':'🌧️','rainbow':'🌈','snow':'❄️','snowfall':'❄️',
    'fog':'🌫️','storm':'⛈️','wind':'💨','sunshine':'☀️',
    'starfall':'🌟','sandstorm':'🌪️','thunderstorm':'⛈️'
  }

  function getWeatherEmoji(title) {
    const t = (title || '').toLowerCase()
    for (const [k, v] of Object.entries(WEATHER_EMOJI)) {
      if (t.includes(k)) return v
    }
    return '🌤️'
  }

  function timeAgo(iso) {
    if (!iso) return '–'
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000)
    if (diff < 60) return `${diff}d lalu`
    if (diff < 3600) return `${Math.floor(diff/60)}m lalu`
    return `${Math.floor(diff/3600)}j lalu`
  }

  function renderSeeds(seeds) {
    const el = document.getElementById('seedList')
    document.getElementById('seedCount').textContent = `${seeds.length} item`
    if (!seeds.length) {
      el.innerHTML = '<div class="empty"><span>🌱</span>Tidak ada seed saat ini</div>'
      return
    }
    el.innerHTML = seeds.map(s => `
      <div class="item-row ${EPIC_PLUS.has(s.name) ? 'epic' : ''}">
        <span class="item-emoji">${s.emoji}</span>
        <span class="item-name">${s.name}</span>
        ${EPIC_PLUS.has(s.name) ? '<span class="epic-star">RARE</span>' : ''}
        <span class="item-qty">${s.qty}x</span>
      </div>
    `).join('')
  }

  function renderGear(gear) {
    const el = document.getElementById('gearList')
    document.getElementById('gearCount').textContent = `${gear.length} item`
    if (!gear.length) {
      el.innerHTML = '<div class="empty"><span>⚙️</span>Tidak ada gear saat ini</div>'
      return
    }
    el.innerHTML = gear.map(g => `
      <div class="item-row">
        <span class="item-emoji">${g.emoji}</span>
        <span class="item-name">${g.name}</span>
        <span class="item-qty">${g.qty}x</span>
      </div>
    `).join('')
  }

  function renderWeather(weather) {
    if (!weather?.title) return
    const card = document.getElementById('weatherCard')
    card.style.display = 'flex'
    document.getElementById('weatherIcon').textContent = getWeatherEmoji(weather.title)
    document.getElementById('weatherTitle').textContent = weather.title
    document.getElementById('weatherBody').textContent = weather.body
      ?.replace(/<t:\d+:[^>]+>/g, '')
      ?.replace(/\*\*/g, '')
      ?.trim() || '–'
    document.getElementById('weatherTime').textContent = timeAgo(weather.updatedAt)
  }

  async function fetchStock() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/gag2_stock?id=eq.1&select=*`, {
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': `Bearer ${SUPABASE_ANON}`
        }
      })
      const data = await res.json()
      if (!data?.length) return

      const row = data[0]

      document.getElementById('loadingEl').style.display = 'none'
      document.getElementById('stockGrid').style.display = 'grid'
      document.getElementById('lastUpdate').textContent = `Update: ${timeAgo(row.updated_at)}`

      renderSeeds(row.seeds || [])
      renderGear(row.gear || [])
      renderWeather(row.weather || {})
    } catch (e) {
      console.error('Fetch error:', e)
    }
  }

  // Realtime via Supabase
  function subscribeRealtime() {
    const ws = new WebSocket(
      `wss://xcxciixqhmghitmyigbj.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_ANON}&vsn=1.0.0`
    )

    ws.onopen = () => {
      ws.send(JSON.stringify({
        topic: "realtime:public:gag2_stock",
        event: "phx_join",
        payload: {},
        ref: "1"
      }))
    }

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data)
      if (msg.event === 'UPDATE' || msg.event === 'INSERT') {
        fetchStock()
      }
    }

    ws.onclose = () => {
      // Reconnect setelah 3 detik
      setTimeout(subscribeRealtime, 3000)
    }
  }

  // Fetch awal + polling fallback tiap 30 detik
  fetchStock()
  subscribeRealtime()
  setInterval(fetchStock, 30000)
</script>

</body>
</html>
